<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xotics — Hoteles</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#1668e3;--blue-dark:#0e4eb5;--blue-light:#e8f0fe;
  --yellow:#f5a623;
  --bg:#f5f5f5;--surface:#fff;--text:#1a1a2e;--text-sec:#6b7280;--text-light:#9ca3af;
  --border:#d4d4d8;--border-light:#e5e7eb;
  --green:#0e8345;--green-bg:#e6f4ea;
  --red:#c41e3a;--red-bg:#fce8e8;
  --radius:8px;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;font-size:14px}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}

.header{background:var(--surface);border-bottom:1px solid var(--border-light);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:24px}
.logo{font-size:18px;font-weight:700;color:var(--blue);letter-spacing:-.5px}
.header-nav{display:flex;gap:4px}
.header-nav button{background:none;border:none;padding:8px 16px;font-size:13px;color:var(--text-sec);border-radius:20px;font-weight:500;transition:all .15s}
.header-nav button:hover{background:var(--blue-light);color:var(--blue)}
.header-nav button.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.header-right{display:flex;align-items:center;gap:12px}
.env-tag{font-size:11px;font-weight:600;background:#fef3c7;color:#92400e;padding:4px 10px;border-radius:4px;letter-spacing:.3px}
.quota-tag{font-size:12px;color:var(--text-sec)}
.quota-tag strong{color:var(--text)}

.hero{background:linear-gradient(165deg,#0a1628 0%,#1a365d 50%,#1e4d8c 100%);padding:48px 24px 64px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 30h60M30 0v60' stroke='%23ffffff' stroke-width='.3' opacity='.05'/%3E%3C/svg%3E")}
.hero-content{max-width:1100px;margin:0 auto;position:relative;z-index:1}
.hero h2{color:#fff;font-size:28px;font-weight:700;margin-bottom:24px;letter-spacing:-.5px}

.search-bar{background:var(--surface);border-radius:12px;padding:6px;display:flex;align-items:stretch;box-shadow:0 2px 16px rgba(0,0,0,.15);position:relative}
.search-field{flex:1;min-width:0;position:relative;display:flex;align-items:center;padding:0 16px;border-right:1px solid var(--border-light);cursor:pointer}
.search-field:last-of-type{border-right:none}
.search-field label{position:absolute;top:8px;left:16px;font-size:10px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.8px;pointer-events:none}
.search-field input{width:100%;border:none;outline:none;font-size:14px;color:var(--text);background:transparent;padding:24px 0 6px;cursor:pointer}
.search-field input::placeholder{color:var(--text-light)}
.search-field.dest{flex:1.8}
.search-field.dates{flex:1.2}
.search-field.travelers{flex:1;border-right:none}
.btn-search-main{background:var(--blue);color:#fff;border:none;padding:0 28px;border-radius:8px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;transition:background .15s;white-space:nowrap;min-height:52px}
.btn-search-main:hover{background:var(--blue-dark)}
.btn-search-main:disabled{opacity:.5;cursor:not-allowed}
.btn-search-main svg{width:18px;height:18px;fill:currentColor}

.dest-dropdown{position:absolute;top:100%;left:-6px;right:-1px;background:var(--surface);border:1px solid var(--border-light);border-radius:0 0 12px 12px;max-height:320px;overflow-y:auto;z-index:60;display:none;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.dest-dropdown.open{display:block}
.dest-section-title{padding:10px 16px 4px;font-size:10px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.8px}
.dest-item{padding:10px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .1s}
.dest-item:hover,.dest-item.hl{background:var(--blue-light)}
.dest-item-icon{width:36px;height:36px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dest-item-icon svg{width:18px;height:18px;fill:var(--text-sec)}
.dest-item-text{flex:1;min-width:0}
.dest-item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dest-item-country{font-size:12px;color:var(--text-sec)}
.dest-item-code{font-size:11px;color:var(--text-light);font-family:'SF Mono',Monaco,Consolas,monospace;background:var(--bg);padding:2px 6px;border-radius:4px;flex-shrink:0}

.travelers-dropdown{position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:20px;min-width:300px;z-index:60;display:none;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.travelers-dropdown.open{display:block}
.trav-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-light)}
.trav-row:last-child{border-bottom:none}
.trav-label{font-size:14px;font-weight:500}
.trav-sublabel{font-size:12px;color:var(--text-sec)}
.trav-controls{display:flex;align-items:center;gap:12px}
.trav-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .15s}
.trav-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.trav-btn:disabled{opacity:.3;cursor:not-allowed}
.trav-count{font-size:15px;font-weight:600;min-width:20px;text-align:center}
.children-ages-section{margin-top:8px;padding-top:12px;border-top:1px solid var(--border-light)}
.children-ages-section label{font-size:12px;font-weight:600;color:var(--text-sec);display:block;margin-bottom:6px}
.child-ages-grid{display:flex;gap:8px;flex-wrap:wrap}
.child-ages-grid select{padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;background:var(--surface)}
.trav-done{width:100%;margin-top:16px;background:var(--blue);color:#fff;border:none;padding:10px;border-radius:8px;font-size:14px;font-weight:600}
.trav-done:hover{background:var(--blue-dark)}

.main{max-width:1100px;margin:0 auto;padding:24px}

.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--border-light)}
.tab{padding:12px 24px;font-size:14px;font-weight:500;color:var(--text-sec);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}

.loading{text-align:center;padding:80px 20px;display:none}
.loading.active{display:block}
.spinner{width:36px;height:36px;border:3px solid var(--border-light);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--text-sec);font-size:14px}

.results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.results-bar h3{font-size:20px;font-weight:700}
.sort-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text)}

.hotel-card{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;margin-bottom:16px;overflow:hidden;transition:box-shadow .2s}
.hotel-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.hotel-card-inner{display:grid;grid-template-columns:260px 1fr;min-height:200px}
.hotel-img{background:var(--bg);position:relative;overflow:hidden}
.hotel-img img{width:100%;height:100%;object-fit:cover;display:block}
.hotel-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.hotel-img-placeholder svg{width:48px;height:48px;fill:var(--border)}
.hotel-body{padding:16px 20px;display:flex;flex-direction:column}
.hotel-body-top{flex:1}
.hotel-name{font-size:18px;font-weight:700;margin-bottom:4px;line-height:1.3}
.hotel-stars{display:flex;gap:2px;margin-bottom:6px}
.hotel-stars .star{width:14px;height:14px}
.hotel-stars .star.filled{fill:var(--yellow)}
.hotel-stars .star.empty{fill:var(--border)}
.hotel-meta{font-size:13px;color:var(--text-sec);margin-bottom:4px}
.hotel-room-info{font-size:13px;color:var(--text-sec);margin-bottom:8px}
.hotel-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.htag{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:500}
.htag-green{background:var(--green-bg);color:var(--green)}
.htag-red{background:var(--red-bg);color:var(--red)}
.htag-blue{background:var(--blue-light);color:var(--blue)}
.htag-gray{background:var(--bg);color:var(--text-sec)}
.hotel-bottom{display:flex;align-items:flex-end;justify-content:space-between;border-top:1px solid var(--border-light);padding-top:12px;margin-top:auto}
.hotel-price{text-align:right}
.hotel-price .per-night{font-size:12px;color:var(--text-sec)}
.hotel-price .amount{font-size:24px;font-weight:700;color:var(--text)}
.hotel-price .currency{font-size:13px;color:var(--text-sec);margin-left:2px}
.hotel-price .total{font-size:12px;color:var(--text-sec)}
.btn-select{background:var(--blue);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius);font-size:14px;font-weight:600;transition:background .15s}
.btn-select:hover{background:var(--blue-dark)}

.rates-toggle{background:none;border:none;color:var(--blue);font-size:13px;font-weight:500;padding:10px 20px;width:100%;text-align:left;border-top:1px solid var(--border-light)}
.rates-toggle:hover{background:var(--blue-light)}
.rates-panel{display:none;border-top:1px solid var(--border-light)}
.rates-panel.open{display:block}
.rate-option{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border-light);font-size:13px}
.rate-option:last-child{border-bottom:none}
.rate-option:hover{background:#fafafa}
.rate-detail{flex:1}
.rate-detail-name{font-weight:500;margin-bottom:2px}
.rate-detail-board{color:var(--text-sec);font-size:12px}
.rate-option-price{font-size:16px;font-weight:700;margin:0 20px}
.btn-rate-pick{background:var(--surface);border:1.5px solid var(--blue);color:var(--blue);padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;transition:all .15s}
.btn-rate-pick:hover{background:var(--blue);color:#fff}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:12px;max-width:560px;width:100%;padding:28px;position:relative}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h3{font-size:20px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-sec);transition:background .15s}
.modal-close:hover{background:var(--border-light)}

.bk-summary{background:var(--bg);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.bk-hotel{font-size:16px;font-weight:700;margin-bottom:8px}
.bk-line{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;color:var(--text-sec)}
.bk-line span:last-child{color:var(--text);font-weight:500}
.bk-total{display:flex;justify-content:space-between;padding:8px 0 0;margin-top:6px;border-top:2px solid var(--border);font-size:16px;font-weight:700}

.form-grid{display:grid;gap:12px}
.form-grid.cols-2{grid-template-columns:1fr 1fr}
.form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);outline:none;transition:border .15s}
.field input:focus,.field select:focus{border-color:var(--blue)}

.cancel-info{margin:16px 0;padding:10px 12px;background:var(--red-bg);border-radius:var(--radius);font-size:12px;color:var(--red)}
.rate-comments-info{margin:12px 0;padding:10px 12px;background:#fef9e7;border-radius:var(--radius);font-size:12px;color:#92400e}

.btn-confirm{width:100%;padding:14px;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;background:var(--blue);color:#fff;margin-top:16px;transition:background .15s}
.btn-confirm:hover{background:var(--blue-dark)}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed}

.confirmation{display:none;text-align:center;padding:48px 20px}
.confirmation.active{display:block}
.conf-icon{width:56px;height:56px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.conf-icon svg{width:28px;height:28px;fill:var(--green)}
.confirmation h3{font-size:22px;font-weight:700;margin-bottom:4px}
.confirmation .conf-ref{color:var(--text-sec);margin-bottom:24px}

.voucher{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:24px;max-width:560px;margin:0 auto;text-align:left;font-size:13px}
.voucher-title{font-size:16px;font-weight:700;text-align:center;padding-bottom:12px;border-bottom:2px solid var(--text);margin-bottom:16px}
.v-section{font-size:12px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.v-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border-light)}
.v-row:last-of-type{border-bottom:none}
.v-payment{margin-top:16px;padding:12px;background:var(--bg);border-radius:var(--radius);font-size:11px;color:var(--text-sec);line-height:1.6}

.booking-card{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:16px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.booking-card h4{font-size:15px;font-weight:600;margin-bottom:2px}
.booking-card p{font-size:13px;color:var(--text-sec)}
.booking-actions{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.btn-cancel-bk{background:none;border:1.5px solid var(--red);color:var(--red);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;transition:all .15s}
.btn-cancel-bk:hover{background:var(--red-bg)}

.no-results{text-align:center;padding:80px 20px;color:var(--text-sec)}
.no-results p{font-size:15px}

.log-panel{position:fixed;bottom:0;left:0;right:0;background:#0f172a;color:#94a3b8;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:11px;max-height:220px;overflow-y:auto;z-index:150;transform:translateY(100%);transition:transform .25s}
.log-panel.open{transform:translateY(0)}
.log-btn{position:fixed;bottom:12px;right:12px;background:#0f172a;color:#94a3b8;border:none;padding:6px 14px;border-radius:6px;font-size:11px;z-index:151;font-family:'SF Mono',Monaco,Consolas,monospace;transition:background .15s}
.log-btn:hover{background:#1e293b}
.log-entry{padding:4px 16px;border-bottom:1px solid #1e293b}
.log-entry.req{color:#60a5fa}
.log-entry.res{color:#34d399}
.log-entry.err{color:#f87171}

.conf-actions{display:flex;gap:8px;justify-content:center;margin-top:20px}
.btn-outline{background:var(--surface);border:1.5px solid var(--blue);color:var(--blue);padding:10px 24px;border-radius:var(--radius);font-size:14px;font-weight:600;transition:all .15s}
.btn-outline:hover{background:var(--blue-light)}
.btn-primary{background:var(--blue);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius);font-size:14px;font-weight:600;transition:background .15s}
.btn-primary:hover{background:var(--blue-dark)}

@media(max-width:768px){
  .search-bar{flex-direction:column;padding:12px}
  .search-field{border-right:none;border-bottom:1px solid var(--border-light);padding:8px 12px}
  .search-field:last-of-type{border-bottom:none}
  .btn-search-main{width:100%;justify-content:center;min-height:44px;margin-top:8px;border-radius:var(--radius)}
  .hotel-card-inner{grid-template-columns:1fr}
  .hotel-img{height:200px}
  .form-grid.cols-2,.form-grid.cols-3{grid-template-columns:1fr}
  .hero h2{font-size:22px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">XOTICS</div>
    <nav class="header-nav">
      <button class="active" onclick="switchTab('search')">Hoteles</button>
      <button onclick="switchTab('bookings')">Mis reservas</button>
    </nav>
  </div>
  <div class="header-right">
    <span class="env-tag">SANDBOX</span>
    <span class="quota-tag">API: <strong id="apiCallCount">0</strong>/50</span>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h2>Busca entre miles de hoteles al mejor precio</h2>
    <form class="search-bar" id="searchForm" onsubmit="searchHotels(event)">
      <div class="search-field dest" id="destWrapper">
        <label>Destino</label>
        <input type="text" id="destInput" placeholder="Ciudad o destino" autocomplete="off" required>
        <input type="hidden" id="destCode">
        <div class="dest-dropdown" id="destDropdown"></div>
      </div>
      <div class="search-field dates">
        <label>Fechas</label>
        <input type="date" id="checkIn" required style="width:46%;display:inline-block;border:none;outline:none;font-size:13px;padding:24px 0 6px;background:transparent">
        <span style="color:var(--text-light);padding-top:18px">—</span>
        <input type="date" id="checkOut" required style="width:44%;display:inline-block;border:none;outline:none;font-size:13px;padding:24px 0 6px;background:transparent">
      </div>
      <div class="search-field travelers" id="travField" onclick="toggleTravelers(event)">
        <label>Viajeros</label>
        <input type="text" id="travSummary" value="2 adultos, 1 hab." readonly style="cursor:pointer">
        <div class="travelers-dropdown" id="travDropdown" onclick="event.stopPropagation()">
          <div class="trav-row"><div><div class="trav-label">Habitaciones</div></div><div class="trav-controls"><button type="button" class="trav-btn" onclick="adjTrav('rooms',-1)">-</button><span class="trav-count" id="tv-rooms">1</span><button type="button" class="trav-btn" onclick="adjTrav('rooms',1)">+</button></div></div>
          <div class="trav-row"><div><div class="trav-label">Adultos</div></div><div class="trav-controls"><button type="button" class="trav-btn" onclick="adjTrav('adults',-1)">-</button><span class="trav-count" id="tv-adults">2</span><button type="button" class="trav-btn" onclick="adjTrav('adults',1)">+</button></div></div>
          <div class="trav-row"><div><div class="trav-label">Ninos</div><div class="trav-sublabel">0 a 17 anos</div></div><div class="trav-controls"><button type="button" class="trav-btn" onclick="adjTrav('children',-1)">-</button><span class="trav-count" id="tv-children">0</span><button type="button" class="trav-btn" onclick="adjTrav('children',1)">+</button></div></div>
          <div class="children-ages-section" id="childAgesSection" style="display:none"><label>Edad de cada nino al hacer check-in</label><div class="child-ages-grid" id="childAgesGrid"></div></div>
          <button type="button" class="trav-done" onclick="closeTravelers()">Listo</button>
        </div>
      </div>
      <button type="submit" class="btn-search-main" id="btnSearch">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        Buscar
      </button>
    </form>
  </div>
</section>

<main class="main">
  <div class="tabs" id="tabsBar">
    <button class="tab active" onclick="switchTab('search')">Busqueda</button>
    <button class="tab" onclick="switchTab('bookings')">Mis reservas</button>
  </div>

  <div class="tab-content active" id="tab-search">
    <div class="loading" id="loading"><div class="spinner"></div><p>Buscando hoteles disponibles...</p></div>
    <div id="resultsArea"></div>
    <div class="confirmation" id="confirmationView">
      <div class="conf-icon"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
      <h3>Reserva confirmada</h3>
      <p class="conf-ref" id="confirmRef"></p>
      <div class="voucher" id="voucherView"></div>
      <div class="conf-actions">
        <button class="btn-outline" onclick="resetSearch()">Nueva busqueda</button>
        <button class="btn-primary" onclick="switchTab('bookings')">Ver mis reservas</button>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-bookings">
    <h3 style="font-size:20px;font-weight:700;margin-bottom:16px">Mis reservas</h3>
    <div id="bookingsList"><div class="no-results"><p>No hay reservas registradas</p></div></div>
  </div>
</main>

<div class="overlay" id="bookingModal">
  <div class="modal">
    <div class="modal-header"><h3>Completar reserva</h3><button class="modal-close" onclick="closeBookingModal()">&times;</button></div>
    <div class="bk-summary" id="bookingSummary"></div>
    <form id="bookingForm" onsubmit="confirmBooking(event)">
      <div class="form-grid cols-2">
        <div class="field"><label>Nombre</label><input type="text" id="paxName" required placeholder="Nombre"></div>
        <div class="field"><label>Apellido</label><input type="text" id="paxSurname" required placeholder="Apellido"></div>
      </div>
      <div class="form-grid cols-2" style="margin-top:12px">
        <div class="field"><label>Email</label><input type="email" id="paxEmail" required placeholder="correo@ejemplo.com"></div>
        <div class="field"><label>Telefono</label><input type="tel" id="paxPhone" required placeholder="+52 55 1234 5678"></div>
      </div>
      <div class="form-grid cols-3" style="margin-top:12px">
        <div class="field"><label>Nacionalidad</label><select id="market"><option value="US">Estados Unidos</option><option value="MX">Mexico</option><option value="ES">Espana</option><option value="GB">Reino Unido</option><option value="CO">Colombia</option><option value="AR">Argentina</option><option value="BR">Brasil</option><option value="FR">Francia</option><option value="DE">Alemania</option><option value="IT">Italia</option><option value="CL">Chile</option><option value="PE">Peru</option><option value="CA">Canada</option><option value="JP">Japon</option><option value="CN">China</option></select></div>
        <div class="field"><label>Referencia</label><input type="text" id="clientRef" placeholder="XOTICS-001"></div>
        <div class="field"><label>Observaciones</label><input type="text" id="paxRemark" placeholder="Notas"></div>
      </div>
      <div id="cancelPolicies"></div>
      <button type="submit" class="btn-confirm" id="btnConfirm">Confirmar reserva</button>
    </form>
  </div>
</div>

<button class="log-btn" onclick="toggleLog()">API Log</button>
<div class="log-panel" id="logPanel"></div>

<script>
const API_BASE='';let apiCallCount=0,currentResults=[],selectedRate=null,bookings=JSON.parse(localStorage.getItem('xotics_bookings')||'[]'),allDestinations=[],hlIdx=-1,trav={rooms:1,adults:2,children:0};

function init(){const t=new Date,ci=new Date(t);ci.setDate(t.getDate()+30);const co=new Date(ci);co.setDate(ci.getDate()+2);document.getElementById('checkIn').value=fmt(ci);document.getElementById('checkOut').value=fmt(co);document.getElementById('checkIn').min=fmt(t);loadDestinations();setupAutocomplete();renderBookings()}
function fmt(d){return d.toISOString().split('T')[0]}

async function apiCall(m,ep,body=null){const url=API_BASE+'/api'+ep;logApi('REQ',m,ep,body);apiCallCount++;document.getElementById('apiCallCount').textContent=apiCallCount;try{const o={method:m,headers:{'Accept':'application/json','Content-Type':'application/json'}};if(body)o.body=JSON.stringify(body);const r=await fetch(url,o),d=await r.json();logApi(r.ok?'RES':'ERR',r.status,ep,d);if(!r.ok)throw{status:r.status,data:d};return d}catch(e){if(e.status)throw e;logApi('ERR','NET',ep,e.message);throw e}}
function logApi(t,s,ep,d){const p=document.getElementById('logPanel'),c=t==='REQ'?'req':t==='ERR'?'err':'res',tm=new Date().toLocaleTimeString(),pv=typeof d==='object'?JSON.stringify(d).substring(0,200):d;p.innerHTML+=`<div class="log-entry ${c}">[${tm}] ${t} ${s} ${ep} — ${pv}</div>`;p.scrollTop=p.scrollHeight}
function toggleLog(){document.getElementById('logPanel').classList.toggle('open')}

async function loadDestinations(){
  // Primero intenta el cache del servidor (crawler semanal)
  try{
    const r=await fetch('/destinations');
    if(r.ok){
      const data=await r.json();
      if(Array.isArray(data)&&data.length>0){
        allDestinations=data.map(x=>({
          code:x.code,
          name:(x.name&&(x.name.content||x.name))||x.code,
          countryCode:x.countryCode||''
        }));
        return;
      }
    }
  }catch(e){}
  // Fallback: sessionStorage de sesion anterior
  const c=sessionStorage.getItem('xotics_destinations_v2');
  if(c){allDestinations=JSON.parse(c);return}
  // Ultimo recurso: lista local
  loadFallback();
}
function loadFallback(){allDestinations=[{code:'PMI',name:'Palma de Mallorca',countryCode:'ES'},{code:'NYC',name:'New York',countryCode:'US'},{code:'CUN',name:'Cancun',countryCode:'MX'},{code:'LON',name:'London',countryCode:'GB'},{code:'BCN',name:'Barcelona',countryCode:'ES'},{code:'MAD',name:'Madrid',countryCode:'ES'},{code:'PAR',name:'Paris',countryCode:'FR'},{code:'MIA',name:'Miami',countryCode:'US'},{code:'ROM',name:'Rome',countryCode:'IT'},{code:'MCO',name:'Orlando',countryCode:'US'},{code:'LAX',name:'Los Angeles',countryCode:'US'},{code:'LIS',name:'Lisbon',countryCode:'PT'},{code:'AMS',name:'Amsterdam',countryCode:'NL'},{code:'DXB',name:'Dubai',countryCode:'AE'},{code:'BKK',name:'Bangkok',countryCode:'TH'},{code:'TYO',name:'Tokyo',countryCode:'JP'},{code:'IST',name:'Istanbul',countryCode:'TR'},{code:'ATH',name:'Athens',countryCode:'GR'},{code:'AGP',name:'Malaga',countryCode:'ES'},{code:'SVQ',name:'Sevilla',countryCode:'ES'},{code:'VLC',name:'Valencia',countryCode:'ES'},{code:'SFO',name:'San Francisco',countryCode:'US'},{code:'CHI',name:'Chicago',countryCode:'US'},{code:'LAS',name:'Las Vegas',countryCode:'US'},{code:'PUJ',name:'Punta Cana',countryCode:'DO'},{code:'BOG',name:'Bogota',countryCode:'CO'},{code:'LIM',name:'Lima',countryCode:'PE'},{code:'SCL',name:'Santiago de Chile',countryCode:'CL'},{code:'EZE',name:'Buenos Aires',countryCode:'AR'},{code:'GIG',name:'Rio de Janeiro',countryCode:'BR'},{code:'MEX',name:'Ciudad de Mexico',countryCode:'MX'},{code:'GDL',name:'Guadalajara',countryCode:'MX'},{code:'MTY',name:'Monterrey',countryCode:'MX'},{code:'SJD',name:'Los Cabos',countryCode:'MX'},{code:'PVR',name:'Puerto Vallarta',countryCode:'MX'},{code:'MID',name:'Merida',countryCode:'MX'},{code:'BER',name:'Berlin',countryCode:'DE'},{code:'MUC',name:'Munich',countryCode:'DE'},{code:'VIE',name:'Vienna',countryCode:'AT'},{code:'PRG',name:'Prague',countryCode:'CZ'},{code:'BUD',name:'Budapest',countryCode:'HU'},{code:'CPH',name:'Copenhagen',countryCode:'DK'},{code:'DUB',name:'Dublin',countryCode:'IE'},{code:'EDI',name:'Edinburgh',countryCode:'GB'},{code:'ZRH',name:'Zurich',countryCode:'CH'},{code:'MIL',name:'Milan',countryCode:'IT'},{code:'VCE',name:'Venice',countryCode:'IT'},{code:'FLR',name:'Florence',countryCode:'IT'},{code:'SIN',name:'Singapore',countryCode:'SG'},{code:'HKG',name:'Hong Kong',countryCode:'HK'},{code:'SEL',name:'Seoul',countryCode:'KR'},{code:'SYD',name:'Sydney',countryCode:'AU'},{code:'CAI',name:'Cairo',countryCode:'EG'},{code:'RAK',name:'Marrakech',countryCode:'MA'},{code:'HAV',name:'Havana',countryCode:'CU'},{code:'MBJ',name:'Montego Bay',countryCode:'JM'}]}

const COUNTRIES={US:'Estados Unidos',MX:'Mexico',ES:'Espana',GB:'Reino Unido',FR:'Francia',IT:'Italia',PT:'Portugal',NL:'Paises Bajos',AE:'Emiratos Arabes',TH:'Tailandia',JP:'Japon',TR:'Turquia',GR:'Grecia',DE:'Alemania',BR:'Brasil',CO:'Colombia',AR:'Argentina',CL:'Chile',PE:'Peru',CA:'Canada',CN:'China',AU:'Australia',EG:'Egipto',MA:'Marruecos',DO:'Rep. Dominicana',CU:'Cuba',SG:'Singapur',HK:'Hong Kong',KR:'Corea del Sur',AT:'Austria',CZ:'Rep. Checa',HU:'Hungria',DK:'Dinamarca',IE:'Irlanda',CH:'Suiza',JM:'Jamaica',AW:'Aruba'};
function cn(c){return COUNTRIES[c]||c}

function setupAutocomplete(){const inp=document.getElementById('destInput'),dd=document.getElementById('destDropdown');let timer;inp.addEventListener('input',()=>{clearTimeout(timer);document.getElementById('destCode').value='';hlIdx=-1;timer=setTimeout(()=>filterDest(inp.value),120)});inp.addEventListener('focus',()=>{if(inp.value.length>=1)filterDest(inp.value);else showPopular()});inp.addEventListener('keydown',e=>{const items=dd.querySelectorAll('.dest-item');if(!items.length)return;if(e.key==='ArrowDown'){e.preventDefault();hlIdx=Math.min(hlIdx+1,items.length-1);hlUp(items)}else if(e.key==='ArrowUp'){e.preventDefault();hlIdx=Math.max(hlIdx-1,0);hlUp(items)}else if(e.key==='Enter'&&hlIdx>=0){e.preventDefault();items[hlIdx].click()}else if(e.key==='Escape')dd.classList.remove('open')});document.addEventListener('click',e=>{if(!document.getElementById('destWrapper').contains(e.target))dd.classList.remove('open')})}
function hlUp(items){items.forEach((el,i)=>{el.classList.toggle('hl',i===hlIdx);if(i===hlIdx)el.scrollIntoView({block:'nearest'})})}
function showPopular(){const pop=['CUN','NYC','LON','BCN','MAD','PAR','MIA','ROM','DXB','MCO'];const f=allDestinations.filter(d=>pop.includes(d.code));renderDest(f.length?f:allDestinations.slice(0,10),'','Destinos populares')}
function filterDest(q){q=q.toLowerCase().trim();if(!q){showPopular();return}const r=allDestinations.map(d=>{const n=d.name.toLowerCase(),c=d.code.toLowerCase(),ct=cn(d.countryCode).toLowerCase();let s=0;if(c===q)s=100;else if(n.startsWith(q))s=90;else if(n.includes(q))s=70;else if(ct.startsWith(q))s=60;else if(ct.includes(q))s=50;else if(c.startsWith(q))s=80;return{...d,s}}).filter(d=>d.s>0).sort((a,b)=>b.s-a.s).slice(0,10);renderDest(r,q)}
function renderDest(ds,q='',title=''){const dd=document.getElementById('destDropdown');if(!ds.length){dd.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-sec)">Sin resultados</div>';dd.classList.add('open');return}let h=title?`<div class="dest-section-title">${title}</div>`:'';ds.forEach(d=>{const nm=q?hlT(d.name,q):d.name;h+=`<div class="dest-item" onclick="pickDest('${d.code}','${d.name.replace(/'/g,"\\'")}','${d.countryCode}')"><div class="dest-item-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg></div><div class="dest-item-text"><div class="dest-item-name">${nm}</div><div class="dest-item-country">${cn(d.countryCode)}</div></div><span class="dest-item-code">${d.code}</span></div>`});dd.innerHTML=h;dd.classList.add('open');hlIdx=-1}
function hlT(t,q){const i=t.toLowerCase().indexOf(q.toLowerCase());if(i===-1)return t;return t.substring(0,i)+'<strong style="color:var(--blue)">'+t.substring(i,i+q.length)+'</strong>'+t.substring(i+q.length)}
function pickDest(code,name,cc){document.getElementById('destInput').value=`${name}, ${cn(cc)}`;document.getElementById('destCode').value=code;document.getElementById('destDropdown').classList.remove('open')}

function toggleTravelers(e){e.stopPropagation();document.getElementById('travDropdown').classList.toggle('open')}
function closeTravelers(){document.getElementById('travDropdown').classList.remove('open');updateTravSum()}
function adjTrav(f,d){const lim={rooms:[1,5],adults:[1,8],children:[0,6]};trav[f]=Math.max(lim[f][0],Math.min(lim[f][1],trav[f]+d));document.getElementById('tv-'+f).textContent=trav[f];if(f==='children')updateChildAges();updateTravSum()}
function updateTravSum(){let s=`${trav.adults} adulto${trav.adults>1?'s':''}, ${trav.rooms} hab.`;if(trav.children>0)s=`${trav.adults} ad., ${trav.children} nino${trav.children>1?'s':''}, ${trav.rooms} hab.`;document.getElementById('travSummary').value=s}
function updateChildAges(){const sec=document.getElementById('childAgesSection'),grid=document.getElementById('childAgesGrid');if(trav.children===0){sec.style.display='none';grid.innerHTML='';return}sec.style.display='block';grid.innerHTML='';for(let i=0;i<trav.children;i++){const s=document.createElement('select');s.className='child-age';s.innerHTML='<option value="">Edad</option>';for(let a=0;a<=17;a++)s.innerHTML+=`<option value="${a}">${a}</option>`;grid.appendChild(s)}}

async function searchHotels(e){e.preventDefault();const dest=document.getElementById('destCode').value;if(!dest){document.getElementById('destInput').focus();return}const ci=document.getElementById('checkIn').value,co=document.getElementById('checkOut').value;if(!ci||!co)return;const paxes=[];if(trav.children>0){const ages=document.querySelectorAll('.child-age');let ok=true;ages.forEach(s=>{const v=parseInt(s.value);if(isNaN(v))ok=false;else paxes.push({type:'CH',age:v})});if(!ok||paxes.length<trav.children){alert('Indica la edad de cada nino');return}}const body={stay:{checkIn:ci,checkOut:co},occupancies:[{rooms:trav.rooms,adults:trav.adults,children:trav.children,...(paxes.length>0&&{paxes})}],destination:{code:dest},filter:{maxHotels:20,maxRatesPerRoom:5}};document.getElementById('loading').classList.add('active');document.getElementById('resultsArea').innerHTML='';document.getElementById('confirmationView').classList.remove('active');document.getElementById('btnSearch').disabled=true;try{const data=await apiCall('POST','/hotel-api/1.0/hotels',body);currentResults=data.hotels?.hotels||[];renderResults(currentResults,ci,co)}catch(err){document.getElementById('resultsArea').innerHTML=`<div class="no-results"><p>${err.data?.error?.message||'Error al buscar hoteles'}</p></div>`}finally{document.getElementById('loading').classList.remove('active');document.getElementById('btnSearch').disabled=false}}

function starsHtml(n){let h='';for(let i=1;i<=5;i++)h+=`<svg class="star ${i<=n?'filled':'empty'}" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;return h}

function renderResults(hotels,checkIn,checkOut){const area=document.getElementById('resultsArea');if(!hotels.length){area.innerHTML='<div class="no-results"><p>No se encontraron hoteles para estas fechas</p></div>';return}const nights=Math.ceil((new Date(checkOut)-new Date(checkIn))/86400000);let html=`<div class="results-bar"><h3>${hotels.length} hoteles en ${document.getElementById('destInput').value.split(',')[0]}</h3><select class="sort-select" onchange="sortResults(this.value)"><option value="price-asc">Precio: menor a mayor</option><option value="price-desc">Precio: mayor a menor</option><option value="stars-desc">Estrellas</option><option value="name-asc">Nombre A-Z</option></select></div>`;hotels.forEach((hotel,idx)=>{const ch=hotel.rooms?.[0]?.rates?.[0];if(!ch)return;const price=parseFloat(ch.net),pn=Math.round(price/nights),sn=parseInt(hotel.categoryCode)||0,bn=ch.boardName||ch.boardCode||'',rn=hotel.rooms?.[0]?.name||hotel.rooms?.[0]?.code||'',ref=ch.rateClass!=='NRF',rt=ch.rateType,iu=hotel.images?.[0]?`http://photos.hotelbeds.com/giata/${hotel.images[0].path}`:'',ar=[];hotel.rooms?.forEach(rm=>rm.rates?.forEach(r=>ar.push({...r,roomName:rm.name||rm.code})));const hd=JSON.stringify({name:hotel.name||'',code:hotel.code,stars:sn,category:hotel.categoryName||'',destination:hotel.destinationName||'',zone:hotel.zoneName||'',address:hotel.address||''}).replace(/'/g,"&#39;");html+=`<div class="hotel-card"><div class="hotel-card-inner"><div class="hotel-img">${iu?`<img src="${iu}" alt="${hotel.name||''}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="hotel-img-placeholder" style="display:none"><svg viewBox="0 0 24 24"><path d="M7 14c1.66 0 3-1.34 3-3S8.66 8 7 8s-3 1.34-3 3 1.34 3 3 3zm0-4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm12-3h-8v8H3V5H1v15h2v-3h18v3h2V9c0-2.21-1.79-4-4-4zm2 8h-8V9h6c1.1 0 2 .9 2 2v4z"/></svg></div>`:`<div class="hotel-img-placeholder"><svg viewBox="0 0 24 24"><path d="M7 14c1.66 0 3-1.34 3-3S8.66 8 7 8s-3 1.34-3 3 1.34 3 3 3zm0-4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm12-3h-8v8H3V5H1v15h2v-3h18v3h2V9c0-2.21-1.79-4-4-4zm2 8h-8V9h6c1.1 0 2 .9 2 2v4z"/></svg></div>`}</div><div class="hotel-body"><div class="hotel-body-top"><div class="hotel-name">${hotel.name||'Hotel'}</div><div class="hotel-stars">${starsHtml(sn)}</div><div class="hotel-meta">${hotel.destinationName||''}${hotel.zoneName?' — '+hotel.zoneName:''}</div><div class="hotel-room-info">${rn} · ${bn}</div><div class="hotel-tags"><span class="htag ${ref?'htag-green':'htag-red'}">${ref?'Cancelacion gratuita':'No reembolsable'}</span>${rt==='BOOKABLE'?'<span class="htag htag-blue">Reserva inmediata</span>':'<span class="htag htag-gray">Verificacion requerida</span>'}</div></div><div class="hotel-bottom"><button class="btn-select" onclick='selectRate(${JSON.stringify(ch).replace(/'/g,"&#39;")},${hd})'>Reservar</button><div class="hotel-price"><div class="per-night">por noche</div><div><span class="amount">${pn}</span><span class="currency"> ${ch.currency||'EUR'}</span></div><div class="total">${price.toFixed(2)} ${ch.currency||'EUR'} total · ${nights} noche${nights>1?'s':''}</div></div></div></div></div>${ar.length>1?`<button class="rates-toggle" onclick="toggleRates(${idx})">Ver las ${ar.length} opciones de tarifa</button><div class="rates-panel" id="rates-${idx}">${ar.map(r=>`<div class="rate-option"><div class="rate-detail"><div class="rate-detail-name">${r.roomName}</div><div class="rate-detail-board">${r.boardName||r.boardCode||''} · ${r.rateClass==='NRF'?'No reembolsable':'Cancelacion gratuita'}</div></div><div class="rate-option-price">${parseFloat(r.net).toFixed(2)} ${r.currency||'EUR'}</div><button class="btn-rate-pick" onclick='selectRate(${JSON.stringify(r).replace(/'/g,"&#39;")},${hd})'>Elegir</button></div>`).join('')}</div>`:''}</div>`});area.innerHTML=html}

function toggleRates(i){document.getElementById(`rates-${i}`).classList.toggle('open')}
function sortResults(by){const s=[...currentResults].sort((a,b)=>{const pa=parseFloat(a.rooms?.[0]?.rates?.[0]?.net||0),pb=parseFloat(b.rooms?.[0]?.rates?.[0]?.net||0);switch(by){case'price-asc':return pa-pb;case'price-desc':return pb-pa;case'stars-desc':return(parseInt(b.categoryCode)||0)-(parseInt(a.categoryCode)||0);case'name-asc':return(a.name||'').localeCompare(b.name||'');default:return 0}});renderResults(s,document.getElementById('checkIn').value,document.getElementById('checkOut').value)}

async function selectRate(rate,hotel){selectedRate={rate,hotel};if(rate.rateType==='RECHECK'){try{document.getElementById('loading').classList.add('active');const d=await apiCall('POST','/hotel-api/1.0/checkrates',{rooms:[{rateKey:rate.rateKey}]});const c=d.hotel?.rooms?.[0]?.rates?.[0];if(c)selectedRate.rate={...rate,...c}}catch(e){alert('Error al verificar tarifa');return}finally{document.getElementById('loading').classList.remove('active')}}showBookingModal()}

function showBookingModal(){const{rate,hotel}=selectedRate;const ci=document.getElementById('checkIn').value,co=document.getElementById('checkOut').value,nights=Math.ceil((new Date(co)-new Date(ci))/86400000),price=parseFloat(rate.net);document.getElementById('bookingSummary').innerHTML=`<div class="bk-hotel">${hotel.name}</div><div class="bk-line"><span>Check-in</span><span>${ci}</span></div><div class="bk-line"><span>Check-out</span><span>${co}</span></div><div class="bk-line"><span>Noches</span><span>${nights}</span></div><div class="bk-line"><span>Habitacion</span><span>${rate.roomName||''}</span></div><div class="bk-line"><span>Pension</span><span>${rate.boardName||rate.boardCode||''}</span></div><div class="bk-line"><span>Politica</span><span>${rate.rateClass==='NRF'?'No reembolsable':'Cancelacion gratuita'}</span></div><div class="bk-total"><span>Total</span><span>${price.toFixed(2)} ${rate.currency||'EUR'}</span></div>`;let x='';if(rate.cancellationPolicies?.length){x+='<div class="cancel-info">';rate.cancellationPolicies.forEach(p=>{x+=`<div>Cargo de ${p.amount} ${rate.currency||'EUR'} a partir del ${new Date(p.from).toLocaleString('es')}</div>`});x+='</div>'}if(rate.rateComments)x+=`<div class="rate-comments-info"><strong>Importante:</strong> ${rate.rateComments}</div>`;document.getElementById('cancelPolicies').innerHTML=x;document.getElementById('bookingModal').classList.add('open')}
function closeBookingModal(){document.getElementById('bookingModal').classList.remove('open')}

async function confirmBooking(e){e.preventDefault();const{rate,hotel}=selectedRate;const nm=document.getElementById('paxName').value,sn=document.getElementById('paxSurname').value,em=document.getElementById('paxEmail').value,ph=document.getElementById('paxPhone').value,mk=document.getElementById('market').value,cr=document.getElementById('clientRef').value||'XOTICS-'+Date.now(),rm=document.getElementById('paxRemark').value;document.getElementById('btnConfirm').disabled=true;document.getElementById('btnConfirm').textContent='Procesando...';try{const d=await apiCall('POST','/hotel-api/1.0/bookings',{holder:{name:nm,surname:sn},rooms:[{rateKey:rate.rateKey,paxes:[{roomId:1,type:'AD',name:nm,surname:sn}]}],clientReference:cr,remark:`Xotics — ${em} — ${ph}${rm?' — '+rm:''}`});const bk=d.booking;closeBookingModal();const price=parseFloat(rate.net);const rec={id:bk?.reference||'TEST-'+Date.now(),clientRef:cr,hotelName:hotel.name,hotelCode:hotel.code,destination:hotel.destination,address:hotel.address,checkIn:document.getElementById('checkIn').value,checkOut:document.getElementById('checkOut').value,holder:`${nm} ${sn}`,email:em,phone:ph,nationality:mk,room:rate.roomName||'',board:rate.boardName||rate.boardCode||'',price:price.toFixed(2),currency:rate.currency||'EUR',status:'CONFIRMED',createdAt:new Date().toISOString(),supplier:bk?.hotel?.supplier?.name||'Hotelbeds S.L.U.',supplierVat:bk?.hotel?.supplier?.vatNumber||'',remark:rm};bookings.push(rec);localStorage.setItem('xotics_bookings',JSON.stringify(bookings));showConfirmation(rec)}catch(err){alert('Error: '+(err.data?.error?.message||'Intenta de nuevo'))}finally{document.getElementById('btnConfirm').disabled=false;document.getElementById('btnConfirm').textContent='Confirmar reserva'}}

function showConfirmation(r){document.getElementById('resultsArea').innerHTML='';document.getElementById('confirmRef').textContent=`Ref. Hotelbeds: ${r.id} — Ref. agencia: ${r.clientRef}`;document.getElementById('voucherView').innerHTML=buildVoucher(r);document.getElementById('confirmationView').classList.add('active')}
function buildVoucher(r){return`<div class="voucher-title">VOUCHER DE RESERVA</div><div class="v-section">Hotel</div><div class="v-row"><span>Nombre</span><span>${r.hotelName}</span></div><div class="v-row"><span>Direccion</span><span>${r.address||'Consultar con el hotel'}</span></div><div class="v-row"><span>Destino</span><span>${r.destination||''}</span></div><div class="v-section">Huesped</div><div class="v-row"><span>Titular</span><span>${r.holder}</span></div><div class="v-row"><span>Email</span><span>${r.email}</span></div><div class="v-row"><span>Telefono</span><span>${r.phone}</span></div><div class="v-row"><span>Nacionalidad</span><span>${cn(r.nationality)}</span></div><div class="v-section">Reserva</div><div class="v-row"><span>Ref. Hotelbeds</span><span><strong>${r.id}</strong></span></div><div class="v-row"><span>Ref. agencia</span><span>${r.clientRef}</span></div><div class="v-row"><span>Check-in</span><span>${r.checkIn}</span></div><div class="v-row"><span>Check-out</span><span>${r.checkOut}</span></div><div class="v-row"><span>Habitacion</span><span>${r.room}</span></div><div class="v-row"><span>Pension</span><span>${r.board}</span></div>${r.remark?`<div class="v-row"><span>Notas</span><span>${r.remark}</span></div>`:''}<div class="v-payment">Payable through ${r.supplier}, acting as agent for the service operating company, details of which can be provided upon request. VAT: ${r.supplierVat||'N/A'} Reference: ${r.id}</div>`}

function resetSearch(){document.getElementById('confirmationView').classList.remove('active');document.getElementById('resultsArea').innerHTML='';currentResults=[]}
function switchTab(tab){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.header-nav button').forEach(b=>b.classList.remove('active'));const i=tab==='search'?0:1;document.querySelectorAll('.tab')[i].classList.add('active');document.querySelectorAll('.header-nav button')[i].classList.add('active');document.getElementById(`tab-${tab}`).classList.add('active');if(tab==='bookings')renderBookings()}
function renderBookings(){const el=document.getElementById('bookingsList');if(!bookings.length){el.innerHTML='<div class="no-results"><p>No hay reservas registradas</p></div>';return}el.innerHTML=bookings.map((b,i)=>`<div class="booking-card"><div><h4>${b.hotelName}</h4><p>${b.checkIn} — ${b.checkOut} · ${b.holder}</p><p>Ref: ${b.id} · ${b.price} ${b.currency}</p></div><div class="booking-actions"><span class="badge ${b.status==='CONFIRMED'?'badge-green':'badge-red'}">${b.status==='CONFIRMED'?'Confirmada':'Cancelada'}</span>${b.status==='CONFIRMED'?`<button class="btn-cancel-bk" onclick="cancelBooking(${i})">Cancelar</button>`:''}</div></div>`).join('')}
async function cancelBooking(i){if(!confirm('Cancelar esta reserva?'))return;try{await apiCall('DELETE',`/hotel-api/1.0/bookings/${bookings[i].id}?cancellationFlag=CANCELLATION`)}catch(e){}bookings[i].status='CANCELLED';localStorage.setItem('xotics_bookings',JSON.stringify(bookings));renderBookings()}

document.addEventListener('click',e=>{if(!document.getElementById('travField').contains(e.target))document.getElementById('travDropdown').classList.remove('open')});
init();
</script>
</body>
</html>
